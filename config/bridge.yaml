# ros_gz_bridge parameter_bridge config
# todo: prefix 'odom' and 'joint_states' with 'sim'
# to make clear they're ground truth?
- gz_topic_name: /clock
  ros_topic_name: clock
  gz_type_name: gz.msgs.Clock
  ros_type_name: rosgraph_msgs/msg/Clock
  direction: GZ_TO_ROS

- gz_topic_name: /antsy/odometry
  ros_topic_name: odom
  gz_type_name: gz.msgs.Odometry
  ros_type_name: nav_msgs/msg/Odometry
  direction: GZ_TO_ROS

- gz_topic_name: /antsy/joint_state
  ros_topic_name: joint_states
  gz_type_name: gz.msgs.Model
  ros_type_name: sensor_msgs/msg/JointState
  direction: GZ_TO_ROS

- gz_topic_name: /antsy/imu
  ros_topic_name: imu
  gz_type_name: gz.msgs.IMU
  ros_type_name: sensor_msgs/msg/Imu
  direction: GZ_TO_ROS

# Gazebo Ignition 6 JointPositionController consumes one gz.msgs.Double topic
# per joint. The controller still publishes /actuators for hardware/debug, but
# simulation commands are bridged through these per-joint position setpoints.
- gz_topic_name: /antsy/joint_position/leg_0_base__leg_0a
  ros_topic_name: /antsy/joint_position/leg_0_base__leg_0a
  gz_type_name: gz.msgs.Double
  ros_type_name: std_msgs/msg/Float64
  direction: ROS_TO_GZ

